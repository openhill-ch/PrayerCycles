workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    # The value below MUST exactly match the name of the App Store Connect
    # API key you add in Codemagic: Team settings -> Integrations ->
    # App Store Connect. Rename the integration there to match this, or
    # change this string to match the integration's name.
    integrations:
      app_store_connect: "Prayer Cycles ASC"
    environment:
      groups:
        # Codemagic UI group that holds CERTIFICATE_PRIVATE_KEY (secure).
        - codesigning
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.prayercycles.app"
        TEAM_ID: "AY34BV93Z7"
      node: 22
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          # Pass a stable private key so the distribution certificate is created
          # once (first build) and reused on every later build — this is what was
          # missing ("Cannot create resource without certificate private key") and
          # it also avoids hitting Apple's distribution-cert limit. fetch-signing-files
          # --create then creates the cert (if needed) and the App Store profile.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          # Resolve the profile fetch-signing-files downloaded. Xcode 16+/26 moved
          # provisioning profiles to the Xcode UserData dir, so search both the old
          # (MobileDevice) and new (Xcode UserData) locations. Pass the profile UUID
          # to the archive explicitly since use-profiles isn't writing it into the
          # App target on this SPM project. UUID avoids the space-in-name xcargs issue.
          PROFILE_PATH=$(ls -t \
            "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision \
            "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/"*.mobileprovision \
            2>/dev/null | head -1)
          if [ -z "$PROFILE_PATH" ]; then
            echo "ERROR: no provisioning profile found. Listing both locations:"
            echo "--- MobileDevice ---"
            ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || echo "  (missing)"
            echo "--- Xcode UserData ---"
            ls -la "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/" 2>/dev/null || echo "  (missing)"
            exit 1
          fi
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          echo "Using provisioning profile: $PROFILE_PATH (UUID $PROFILE_UUID)"
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "COMPILER_INDEX_STORE_ENABLE=NO DEVELOPMENT_TEAM=$TEAM_ID CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE_SPECIFIER=$PROFILE_UUID"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
