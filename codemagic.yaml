workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    # The value below MUST exactly match the name of the App Store Connect
    # API key you add in Codemagic: Team settings -> Integrations ->
    # App Store Connect. Rename the integration there to match this, or
    # change this string to match the integration's name.
    integrations:
      app_store_connect: "Prayer Cycles ASC"
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.prayercycles.app"
        TEAM_ID: "AY34BV93Z7"
      node: 22
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          # use-profiles isn't writing the profile into the App target on this
          # Xcode 26 / SPM project, so resolve the profile that fetch-signing-files
          # downloaded and pass its UUID to the archive explicitly. UUID (not name)
          # avoids the space-in-name problem with xcargs.
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH=$(ls -t "$PROFILE_DIR"/*.mobileprovision | head -1)
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          echo "Using provisioning profile: $PROFILE_PATH (UUID $PROFILE_UUID)"
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "COMPILER_INDEX_STORE_ENABLE=NO DEVELOPMENT_TEAM=$TEAM_ID CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE_SPECIFIER=$PROFILE_UUID"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
